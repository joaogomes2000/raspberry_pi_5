name: Deploy infrastructure and migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  terraform_plan:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: self-hosted
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Prepare workspace
        run: |
          if [ ! -d .git ]; then
            git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          else
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
          fi

      - name: Ensure Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install alembic sqlalchemy psycopg2-binary

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: tfplan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          plan_exit=$?
          if [ "$plan_exit" -eq 1 ]; then
            exit 1
          fi
          echo "plan_exit=$plan_exit" >> "$GITHUB_OUTPUT"

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  manual-approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: terraform_plan
    if: success() # Only proceed if terraform-plan job succeeds
    
    permissions:
      issues: write

    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: joaogomes2000
          minimum-approvals: 1
          issue-title: "Manual Approval Required for Terraform Apply"
          issue-body: "Please approve or deny the deployment."

  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    needs:  manual-approval
    runs-on: self-hosted
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Prepare workspace
        run: |
          if [ ! -d .git ]; then
            git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          else
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
          fi

      - name: Ensure Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install alembic sqlalchemy psycopg2-binary

      - name: Terraform init
        run: terraform init

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec my-postgres-db pg_isready -U myuser -d mydatabase; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          docker logs my-postgres-db
          exit 1

      - name: Run Alembic migrations
        run: .venv/bin/python -m alembic upgrade head

      - name: Deploy Clima Automation with Docker Compose
        run: |
          echo "A fazer deploy e rebuild do contentor de automação..."
          docker compose up -d --build
