name: Deploy infrastructure and migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: self-hosted
    environment: production
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Prepare workspace
        run: |
          if [ ! -d .git ]; then
            git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          else
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
          fi

      - name: Ensure Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install alembic sqlalchemy psycopg2-binary

      - name: Terraform init
        run: terraform init

      - name: Sync Terraform state with Docker
        run: |
          set -euo pipefail

          state_has() {
            terraform state list | grep -qx "$1"
          }

          import_if_needed() {
            local address="$1"
            local import_id="$2"
            shift 2

            if state_has "$address"; then
              echo "$address already exists in Terraform state"
              return 0
            fi

            if "$@" >/dev/null 2>&1; then
              terraform import "$address" "$import_id"
            else
              echo "$import_id not present in Docker, skipping import"
            fi
          }

          import_if_needed docker_volume.pg_data postgres_data docker volume inspect postgres_data
          import_if_needed docker_container.postgres my-postgres-db docker container inspect my-postgres-db

      - name: Check if PostgreSQL already exists
        id: postgres_exists
        run: |
          if docker container inspect my-postgres-db >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform plan
        id: tfplan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          plan_exit=$?
          echo "plan_exit=$plan_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Terraform apply
        if: steps.tfplan.outputs.plan_exit == '2' && steps.postgres_exists.outputs.exists == 'false'
        run: terraform apply -auto-approve tfplan

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec my-postgres-db pg_isready -U myuser -d mydatabase; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          docker logs my-postgres-db
          exit 1

      - name: Run Alembic migrations
        run: .venv/bin/python -m alembic upgrade head

      - name: Deploy Clima Automation with Docker Compose
        run: |
          echo "A fazer deploy e rebuild do contentor de automação..."
          docker compose up -d --build
