name: Deploy infrastructure and migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  terraform_plan:
    runs-on: self-hosted
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install alembic sqlalchemy psycopg2-binary

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: tfplan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          plan_exit=$?
          if [ "$plan_exit" -eq 1 ]; then
            exit 1
          fi
          echo "plan_exit=$plan_exit" >> "$GITHUB_OUTPUT"

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  deploy:
    runs-on: self-hosted
    needs: terraform_plan
    environment:
      name: production   # 👈 ISTO ativa o approval do Environment

    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install alembic sqlalchemy psycopg2-binary

      - name: Terraform init
        run: terraform init

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Cleanup container
        run: |
          docker rm -f my-postgres-db || true

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec my-postgres-db pg_isready -U myuser -d mydatabase; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          docker logs my-postgres-db
          exit 1

      - name: Run Alembic migrations
        run: .venv/bin/python -m alembic upgrade head

      - name: Deploy Clima Automation with Docker Compose
        run: |
          echo "A fazer deploy..."
          docker compose up -d --build