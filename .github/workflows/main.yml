name: Deploy infrastructure and migrations

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Prepare workspace
        run: |
          if [ ! -d .git ]; then
            git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          else
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
          fi

      - name: Ensure Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install alembic sqlalchemy psycopg2-binary

      - name: Terraform init
        run: terraform init

      - name: Import existing Docker resources
        run: |
          if docker volume inspect postgres_data >/dev/null 2>&1; then
            terraform import docker_volume.pg_data postgres_data || true
          fi

          if docker container inspect my-postgres-db >/dev/null 2>&1; then
            terraform import docker_container.postgres my-postgres-db || true
          fi

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec my-postgres-db pg_isready -U myuser -d mydatabase; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          docker logs my-postgres-db
          exit 1

      - name: Run Alembic migrations
        run: .venv/bin/python -m alembic upgrade head
