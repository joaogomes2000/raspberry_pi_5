name: Deploy infrastructure and migrations

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Prepare workspace
        run: |
          if [ ! -d .git ]; then
            git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          else
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
          fi

      - name: Ensure Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install alembic sqlalchemy psycopg2-binary

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Run Alembic migrations
        run: .venv/bin/python -m alembic upgrade head
