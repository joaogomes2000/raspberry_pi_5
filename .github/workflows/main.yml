name: Deploy infrastructure and migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  terraform_plan:
    runs-on: self-hosted
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -upgrade -reconfigure

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan


  deploy:
    runs-on: self-hosted
    needs: terraform_plan

    environment:
      name: production   # 👈 AQUI acontece o approval

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform init
        run: terraform init -upgrade -reconfigure

      # 👇 ISTO acontece ANTES do approval efetivo
      - name: Show plan (review before apply)
        run: terraform show -no-color tfplan

      - name: Cleanup container
        run: docker rm -f my-postgres-db || true

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan